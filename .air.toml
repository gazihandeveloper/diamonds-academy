root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "data", "web/static"]
  exclude_regex = ["_test\\.go"]
  delay = 200
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  build = "yellow"
  runner = "green"
